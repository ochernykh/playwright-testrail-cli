<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="820" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">playwright-testrail-cli — Як це працює</text>

  <!-- ═══ COLUMN 1 — ai:explore ═══ -->

  <text x="150" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">ai:explore</text>

  <rect x="60" y="82" width="180" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="150" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">URL + --section</text>
  <text x="150" y="112" text-anchor="middle" font-size="10" fill="#6d28d9">(необов'язково)</text>

  <line x1="150" y1="122" x2="150" y2="144" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="146" width="180" height="50" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="150" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Chromium headless</text>
  <text x="150" y="181" text-anchor="middle" font-size="10" fill="#64748b">goto + click tabs</text>

  <line x1="150" y1="196" x2="150" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="220" width="180" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="150" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">ariaSnapshot()</text>
  <text x="150" y="255" text-anchor="middle" font-size="10" fill="#16a34a">main + усі таби</text>

  <line x1="150" y1="270" x2="150" y2="292" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="294" width="180" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="150" y="314" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">GPT-4o</text>
  <text x="150" y="329" text-anchor="middle" font-size="10" fill="#92400e">explorer-seed.md</text>

  <line x1="150" y1="344" x2="150" y2="366" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="368" width="180" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="150" y="383" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">specs/*.md</text>
  <text x="150" y="398" text-anchor="middle" font-size="10" fill="#6d28d9">план тестування</text>


  <!-- ═══ COLUMN 2 — ai:run ═══ -->

  <text x="450" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">ai:run</text>

  <rect x="360" y="82" width="180" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">--story "текст"</text>
  <text x="450" y="112" text-anchor="middle" font-size="10" fill="#1d4ed8">--output file.spec.ts</text>

  <line x1="450" y1="122" x2="450" y2="144" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="360" y="146" width="180" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="164" text-anchor="middle" font-size="10" fill="#15803d">Phase 0</text>
  <text x="450" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">ARIA snapshot</text>
  <text x="450" y="191" text-anchor="middle" font-size="10" fill="#16a34a">headless Chromium</text>

  <line x1="450" y1="196" x2="450" y2="218" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="360" y="220" width="180" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="450" y="238" text-anchor="middle" font-size="10" fill="#92400e">Phase 1</text>
  <text x="450" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">GPT-4o → кроки JSON</text>
  <text x="450" y="265" text-anchor="middle" font-size="10" fill="#92400e">story-to-steps.md</text>

  <line x1="450" y1="270" x2="450" y2="292" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="360" y="294" width="180" height="70" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="450" y="312" text-anchor="middle" font-size="10" fill="#64748b">Phase 2</text>
  <text x="450" y="326" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Playwright execute</text>
  <text x="450" y="340" text-anchor="middle" font-size="10" fill="#64748b">getByRole / getByLabel</text>
  <text x="450" y="354" text-anchor="middle" font-size="10" fill="#16a34a">↻ re-plan після tab</text>

  <line x1="450" y1="364" x2="450" y2="386" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="360" y="388" width="180" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="406" text-anchor="middle" font-size="10" fill="#1d4ed8">Phase 3</text>
  <text x="450" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">recordings/*.spec.ts</text>
  <text x="450" y="433" text-anchor="middle" font-size="10" fill="#1d4ed8">new / append</text>

  <line x1="450" y1="438" x2="450" y2="460" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="360" y="462" width="180" height="50" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="450" y="480" text-anchor="middle" font-size="10" fill="#831843">Phase 4</text>
  <text x="450" y="494" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">TestRail JSON + CSV</text>
  <text x="450" y="507" text-anchor="middle" font-size="10" fill="#be185d">ai-output/</text>

  <!-- ARIA fallback (dashed, left of Phase 2) -->
  <rect x="175" y="530" width="170" height="55" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="260" y="549" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">ARIA fallback</text>
  <text x="260" y="563" text-anchor="middle" font-size="10" fill="#dc2626">крок не знайдено →</text>
  <text x="260" y="576" text-anchor="middle" font-size="10" fill="#dc2626">GPT-4o виправляє</text>

  <!-- Arrow: Phase 2 → fallback -->
  <path d="M360,329 Q320,329 320,557 Q320,557 345,557" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="296" y="450" font-size="9" fill="#dc2626" transform="rotate(-90,296,450)">✗ крок</text>

  <!-- Arrow: fallback → Phase 2 -->
  <path d="M345,542 Q335,542 335,329 Q335,329 360,329" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="314" y="420" font-size="9" fill="#16a34a" transform="rotate(-90,314,420)">виправлено</text>


  <!-- ═══ COLUMN 3 — ai:heal ═══ -->

  <text x="750" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#b45309">ai:heal</text>

  <rect x="660" y="82" width="180" height="40" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="750" y="97" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">--file / --dir</text>
  <text x="750" y="112" text-anchor="middle" font-size="10" fill="#92400e">recordings/*.spec.ts</text>

  <line x1="750" y1="122" x2="750" y2="144" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="660" y="146" width="180" height="50" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="750" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">npx playwright test</text>
  <text x="750" y="181" text-anchor="middle" font-size="10" fill="#64748b">--reporter=list</text>

  <line x1="840" y1="171" x2="855" y2="171" stroke="#16a34a" stroke-width="1.5"/>
  <text x="858" y="175" font-size="10" fill="#16a34a">✓ skip</text>

  <line x1="750" y1="196" x2="750" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="660" y="220" width="180" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="750" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">ARIA snapshot</text>
  <text x="750" y="255" text-anchor="middle" font-size="10" fill="#16a34a">поточний стан UI</text>

  <line x1="750" y1="270" x2="750" y2="292" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="660" y="294" width="180" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="750" y="314" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">GPT-4o фіксить</text>
  <text x="750" y="329" text-anchor="middle" font-size="10" fill="#92400e">локатори → новий код</text>

  <line x1="750" y1="344" x2="750" y2="366" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="660" y="368" width="180" height="50" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="750" y="388" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">re-run тесту</text>
  <text x="750" y="403" text-anchor="middle" font-size="10" fill="#64748b">до 3 спроб</text>

  <!-- retry loop arrow -->
  <path d="M840,393 Q880,393 880,307 Q880,220 840,220" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="884" y="312" font-size="9" fill="#94a3b8" transform="rotate(90,884,312)">retry</text>

  <line x1="750" y1="418" x2="750" y2="440" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="660" y="442" width="180" height="40" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="750" y="457" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">patched spec</text>
  <text x="750" y="472" text-anchor="middle" font-size="10" fill="#92400e">або restored оригінал</text>


  <!-- ═══ LEGEND ═══ -->

  <rect x="60" y="680" width="780" height="120" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="700" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Команди</text>

  <rect x="80" y="712" width="12" height="12" rx="2" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="98" y="723" font-size="11" fill="#334155"><tspan font-weight="600">ai:explore</tspan>  розвідка сайту, кліки по табах → markdown план у specs/</text>

  <rect x="80" y="732" width="12" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="98" y="743" font-size="11" fill="#334155"><tspan font-weight="600">ai:run</tspan>  story → ARIA snapshot → GPT-4o → Playwright execute → spec + TestRail</text>

  <rect x="80" y="752" width="12" height="12" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="98" y="763" font-size="11" fill="#334155"><tspan font-weight="600">ai:heal</tspan>  запуск тестів → ARIA snapshot → GPT-4o фіксить локатори (до 3 спроб)</text>

  <rect x="80" y="772" width="12" height="12" rx="2" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="98" y="783" font-size="11" fill="#334155"><tspan font-weight="600">ai:testrail</tspan>  конвертація будь-якого .spec.ts → TestRail JSON + CSV</text>
</svg>
